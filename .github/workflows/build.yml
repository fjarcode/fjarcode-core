name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libtool autotools-dev automake pkgconf \
          bsdmainutils python3 libevent-dev libboost-dev libsqlite3-dev \
          libminiupnpc-dev libnatpmp-dev libzmq3-dev systemtap-sdt-dev

    - name: Autogen
      run: ./autogen.sh

    - name: Configure
      run: |
        mkdir build && cd build
        ../configure --without-gui --disable-tests --disable-bench

    - name: Build
      run: make -C build -j$(nproc)

    - name: Smoke test
      run: ./build/src/fjarcoded --version
