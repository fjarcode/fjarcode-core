description "FJARCODE Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env CODEFALCOND_BIN="/usr/bin/fjarcoded"
env CODEFALCOND_USER="codefalcon"
env CODEFALCOND_GROUP="codefalcon"
env CODEFALCOND_PIDDIR="/var/run/fjarcoded"
# upstart can't handle variables constructed with other variables
env CODEFALCOND_PIDFILE="/var/run/fjarcoded/fjarcoded.pid"
env CODEFALCOND_CONFIGFILE="/etc/codefalcon/bitcoin.conf"
env CODEFALCOND_DATADIR="/var/lib/fjarcoded"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # fjarcoded will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$CODEFALCOND_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run fjarcoded."
        echo "The setting must appear in $CODEFALCOND_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"FJARCODE Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$CODEFALCOND_PIDDIR"
    chmod 0755 "$CODEFALCOND_PIDDIR"
    chown $CODEFALCOND_USER:$CODEFALCOND_GROUP "$CODEFALCOND_PIDDIR"
    chown $CODEFALCOND_USER:$CODEFALCOND_GROUP "$CODEFALCOND_CONFIGFILE"
    chmod 0660 "$CODEFALCOND_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$CODEFALCOND_PIDFILE" \
    --chuid $CODEFALCOND_USER:$CODEFALCOND_GROUP \
    --exec "$CODEFALCOND_BIN" \
    -- \
    -pid="$CODEFALCOND_PIDFILE" \
    -conf="$CODEFALCOND_CONFIGFILE" \
    -datadir="$CODEFALCOND_DATADIR" \
    -disablewallet \
    -daemon
